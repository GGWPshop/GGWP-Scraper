name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-fragment:
    name: Lint Fragment Scraper
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scrapers/fragment
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check app/

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint-fragment]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            bash /opt/ggwp/deploy/ggwp-scraper.sh
