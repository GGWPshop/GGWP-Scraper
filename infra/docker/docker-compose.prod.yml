services:
  fragment-scraper:
    build:
      context: ../../scrapers/fragment
      dockerfile: Dockerfile
    container_name: ggwp-scraper-fragment
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      APP_BASE_URL: ${APP_BASE_URL:-http://ggwp-gifts-api:8000}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      FRAGMENT_SCRAPER_ENABLED: ${FRAGMENT_SCRAPER_ENABLED:-true}
      SCRAPER_SCHEDULE_CRON: ${SCRAPER_SCHEDULE_CRON:-0 * * * *}
      FRAGMENT_BASE_URL: ${FRAGMENT_BASE_URL:-https://fragment.com}
      SCRAPER_MAX_PAGES: ${SCRAPER_MAX_PAGES:-20}
      SCRAPER_MAX_GIFTS: ${SCRAPER_MAX_GIFTS:-120}
      SCRAPER_DETAIL_CONCURRENCY: ${SCRAPER_DETAIL_CONCURRENCY:-4}
      SCRAPER_HTTP_TIMEOUT: ${SCRAPER_HTTP_TIMEOUT:-30}
      FRAGMENT_API_URL_OVERRIDE: /api?hash=154cf86e790e33579b
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8020/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - ggwp-internal
      - ggwp-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  ggwp-internal:
    name: ggwp-internal
    external: true
  ggwp-network:
    external: true